<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompAnalyst - Salary Compensation Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header>
      <h1>Salary Compensation Explorer</h1>
      <p>Analyze salary compensation benchmarks by labor category, percentile, aging factor, and security clearance.</p>
    </header>

    <section class="controls card" aria-label="Compensation controls">
      <div class="control-grid">
        <label>
          Labor Category
          <select id="categorySelect"></select>
        </label>

        <label>
          Age Salaries By
          <div class="inline-input">
            <input id="agingInput" type="number" min="1" max="4" step="0.1" value="2" />
            <span>%</span>
          </div>
          <small>Allowed range: 1% to 4%</small>
        </label>

        <label>
          Security Clearance
          <select id="clearanceSelect"></select>
        </label>

        <label>
          Clearance Premium
          <div class="inline-input">
            <input id="premiumInput" type="number" min="0" max="60" step="0.1" value="0" />
            <span>%</span>
          </div>
          <small id="premiumGuidance">Select a clearance to auto-fill the baseline premium value.</small>
        </label>
      </div>
    </section>

    <section class="results card" aria-live="polite">
      <h2>Rate Summary</h2>
      <table>
        <thead>
          <tr>
            <th>Percentile</th>
            <th>Base Salary</th>
          </tr>
        </thead>
        <tbody id="summaryBody"></tbody>
      </table>
      <p class="table-note">These compensation benchmarks are expected salary ranges for the selected labor category.</p>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
